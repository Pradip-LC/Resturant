<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSSS/Uhome.css') }}">
    <title>Document</title>
    <style>
    .Menu_display{
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(150px, max-content)); 
      overflow-y: scroll; 
      gap: 20px; 
      padding: 20px;}
    </style>
</head>
<body>
    <div class="main_container">
       <section class="header">
                        <div style="width: 20%;"><h1>FOODbook</h1></div>
                        <div style="width: 50%;">
                            <a href="{{ url_for('logout') }}"><button>Logout</button></a>
                        </div>
                        <div class="header-right">
                            <div style="width: 60%;">
                                <Input type="text" placeholder="Search" class="search_bar">
                            </div>
                            <div style="width: 20%;"><a href ="{{ url_for('cart')}}"><img src="{{ url_for('static', filename='image/Cart.png') }}" height="50px" alt="CART"></a></div>
                            <div class="profile-pic"><a href ="{{ url_for('profile')}}"><img src="{{ url_for('static', filename='image/user_logo.jpg') }}" alt="user profile"></a></div>
                        </div>
        </section>
        <section class="main">
            <div class="left-gap" style="width: 20%;"></div>
                <div style="width: 60%;">
                    <label class="resturant_name" >{{ resturant.name }}</label>
                    <div class="Menu_display">
                    {%for MenuItem in items%}
                        <div class="item">
                            <h2 style="margin: 0;">{{ MenuItem.name }}</h2>
                            <p style="margin: 5px 0;"><strong>${{ MenuItem.price }}</strong></p>
                            <p style="margin: 0; font-size: 0.9em;">{{ MenuItem.description }}</p>
                            <div style="display: flex; flex-direction: row; justify-content: space-between;">
                                <a href="/delete/{{MenuItem.id}}"><button name="Delete" style="width: 50px;">ORDER</button></a>
                                <a href="/additemtocart/{{MenuItem.id}}"><button name="CART" style="width: 50px;">CART</button></a> 
                            </div>
                        </div>
                    {%endfor%}
                </div>
            </div>
            <div class="Right-gap" style="width: 20%;" ></div>
        </section>
                
        <section class="footer">
            <div style="width: 20%;">FOODbook</div>
            <div style="width: 60%;">COPYRIGHT</div>
            <div style="width: 20%;">SOCIALS</div>
        </section> 
    </div>
</body>
</html>
