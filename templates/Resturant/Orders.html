<!DOCTYPE html>
<head>
  <title>Dashboard</title>
  <Style>
    *{
      margin: 0px;
      padding: 0px;
    }
    .main_container{
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
    }
    .header{
      display: flex;
      flex-direction: row;
      overflow: none;
      width: 100%;
      height: 10vh;
    }
    .main{
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 80vh;
    }
    .sidebar{
      display: flex;
      flex-direction: column;
      width: 20%;
      background-color: rgb(18, 33, 172);
    }
    .sidebar hr{
      margin-left: 20%;
      margin-right: 20%;
    }
    .sidebar button{
      border: 1px solid rgb(0, 0, 0);
      border-radius: 5%;
      height: 50px;
      width: 200px;
      background-color: rgb(153, 240, 247);
      margin:auto;
      margin-top: 10px;
      margin-bottom: 10px;
    }
    .sidebar u{
      color: white;
    }
    .content{
      display: flex;
      flex-direction: column;
      width: 80%;
      background-color: rgb(216, 216, 216);
    }
    .footer{
      display: flex;
      flex-direction: row;
      align-items: center;
      width: 100%;
      height: 10vh;
      background-color: rgb(20, 97, 29);
    }
  </Style>
</head>
<body>
    <div class="main_container">
      <section class="header">
        <div style="width: 20%; background-color: azure; align-content: center;"><h2">FOODbook</h2></div>
        <div style="width: 80%; background-color: blanchedalmond; align-content: center; text-align: center;">sdsfsdf</div>
      </section>

      <div class="main">

        <section class="sidebar">

          <div style="height: 20%; text-align: center; display: flex; flex-direction: column;" >
            <a href="{{ url_for('dashboard') }}"><button>Dashboard</button></a>
            <a href="{{ url_for('report') }}"><button>Report</button></a>
          
            <a href="{{ url_for('Menu') }}"><button>Manage menu</button></a>
            <a href="{{ url_for('Orders') }}"><button>Orders</button></a>
            <a href="{{ url_for('profile') }}"><button>Profile</button></a>
            <a href="{{ url_for('logout') }}"><u>Logout</u></a>
         
          </div width="60%" color="black">

        </section>

        <div class="content">
          center<br>
          dasdfsdafasdf<br>
          sdfsadfsadf<br>
          sdfasdfsda<br>
          sadfsadf<br>
          sdaffasdf<br>
        </div>

        </div>

        <section class="footer">
          SASDFSDFSD
        </section>
    </div>
</body>
</html>
